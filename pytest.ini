[pytest]
# Run async tests transparently (no per-test decorator needed) and pin the
# event-loop scope so shared fixtures behave predictably.
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

addopts =
    -q
    --strict-markers
    --cov=app
    --cov-report=term-missing
    --cov-report=html:htmlcov

filterwarnings =
    # aiosqlite/asyncio can emit benign ResourceWarnings on teardown.
    ignore::ResourceWarning
